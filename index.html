<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zitat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #FAF3E6;
  font-family: Georgia, serif;
}
a {
  display: block;
  max-width: 600px;
  padding: 2rem 2rem 2rem 1.5rem;
  text-decoration: none;
  color: #0C1C3B;
  font-size: 4rem;
  line-height: 1.7;
  font-style: italic;
  border-left: 3px solid #0C1C3B;
}
a:hover { color: #555555; }
</style>
</head>
<body>
<a id="q" href="#" target="_blank">Lädt...</a>
<script>
var quotes = [
  { text: "Die Frau hat als Mutter die Pflicht, dem Volk Kinder zu schenken.", url: "https://dl.ub.uni-freiburg.de/diglit/schulungsbrief_jg4_f3" },
  { text: "Das Muttertum ist der hoechste Dienst am Volke.", url: "https://dl.ub.uni-freiburg.de/diglit/schulungsbrief_jg7_f7-8-9" },
  { text: "Die deutsche Frau steht im Dienst der Erhaltung unseres Volkes.", url: "https://dl.ub.uni-freiburg.de/diglit/schulungsbrief_jg7_f7-8-9" },
  { text: "Mutter sein heisst Kaempferin sein fuer die Zukunft des Volkes.", url: "https://archive.org/details/nsdap-schulungsbrief-1934-03_202012/page/30/mode/1up" },
  { text: "Als Traeger des Erbgutes aber fuer dessen Erhaltung und Weitergabe zu sorgen.", url: "https://dokumen.pub/ausstellung-frau-und-mutter-lebensquell-des-volkes.html" }
];
var i = Math.floor(Math.random() * quotes.length);
var el = document.getElementById("q");
el.textContent = quotes[i].text;
el.href = quotes[i].url;
</script>
</body>
</html>
